<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DRAFT LIGUE 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0D0D0D;color:#E0E0E0;font-family:'Inter',sans-serif;display:flex;height:100vh;overflow:hidden;}

/* ── LEFT ── */
#left{width:200px;min-width:200px;background:#111118;border-right:1px solid #1A1A2E;display:flex;flex-direction:column;padding:16px 12px 12px;overflow:hidden;}
.dr-label{font-family:'Bebas Neue',cursive;font-size:10px;letter-spacing:3px;color:#444;margin-bottom:4px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
#roll-counter{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:#E8C547;}
#dice-wrap{text-align:center;flex-shrink:0;margin-top:6px;}
#dice{font-size:44px;cursor:pointer;display:inline-block;user-select:none;line-height:1;transition:opacity .2s;}
#dice.disabled{opacity:.25;cursor:default;pointer-events:none;}
#dice.shake{animation:shake .5s cubic-bezier(.36,.07,.19,.97);}
@keyframes shake{10%,90%{transform:rotate(-6deg) scale(1.1)}20%,80%{transform:rotate(8deg) scale(1.15)}30%,50%,70%{transform:rotate(-10deg) scale(1.2)}40%,60%{transform:rotate(10deg) scale(1.2)}}
#roll-cta{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:3px;color:#E8C547;text-align:center;margin-top:8px;flex-shrink:0;}
#club-badge{text-align:center;margin-top:10px;padding:8px 6px;background:rgba(255,255,255,.02);border-radius:7px;border:1px solid #1A1A2E;flex-shrink:0;}
#cshort{font-family:'Bebas Neue',cursive;font-size:34px;letter-spacing:4px;line-height:1;}
#cname{font-size:9px;color:#777;letter-spacing:.5px;margin-top:2px;line-height:1.4;}
#cseason{font-size:8px;letter-spacing:2px;margin-top:3px;opacity:.7;}
#stats-panel{margin-top:10px;flex-shrink:0;}
.stat-row{margin-bottom:5px;}
.stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.stat-label{font-size:9px;color:#555;letter-spacing:1px;}
.stat-val{font-size:10px;font-weight:600;}
.stat-track{height:3px;background:#1A1A2E;border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;width:0;border-radius:2px;transition:width .8s cubic-bezier(.22,1,.36,1);}
#ovr-block{text-align:center;margin-bottom:8px;}
#ovr-num{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;}
#ovr-sub{font-size:8px;color:#444;letter-spacing:2px;}
#pool-info{font-size:8px;color:#333;letter-spacing:1px;text-align:center;margin-top:8px;flex-shrink:0;}

/* ── CENTER ── */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#toolbar{background:#0F0F15;border-bottom:1px solid #1A1A2E;padding:7px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;}
.fb{background:transparent;border:1px solid #252540;color:#555;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
.fb:hover{border-color:#4A9FD4;color:#4A9FD4;}
.fb.active{border-color:#E8C547;color:#E8C547;background:rgba(232,197,71,.08);}
#ovr-label{font-size:9px;color:#444;letter-spacing:1px;}
#result-count{font-size:9px;color:#333;letter-spacing:1px;margin-left:auto;}
#pick-hint{font-size:10px;color:#E8C547;letter-spacing:1.5px;text-align:center;padding:6px 14px;flex-shrink:0;display:none;background:rgba(232,197,71,.05);border-bottom:1px solid rgba(232,197,71,.1);}
#plist{flex:1;overflow-y:auto;padding:10px 14px;}
#plist::-webkit-scrollbar{width:3px;}
#plist::-webkit-scrollbar-thumb{background:#252540;border-radius:2px;}
.cat-head{font-size:9px;letter-spacing:2px;font-weight:600;margin-bottom:5px;margin-top:12px;padding-bottom:3px;border-bottom:1px solid #1E1E30;}
.cat-head:first-child{margin-top:0;}
.prow{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:5px;cursor:pointer;transition:background .12s,border-color .12s;border:1px solid transparent;}
.prow:hover:not(.blocked){background:#0F1820;border-color:#1E2840;}
.prow.selected{background:#0F1830;border-color:#E8C547 !important;}
.prow.blocked{opacity:.28;cursor:not-allowed;}
.prow.fly{animation:fly .35s ease-in forwards;}
@keyframes fly{to{opacity:0;transform:translateX(50px) scale(.8);}}
.prow.pin{animation:pin-in .22s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pin-in{from{opacity:0;transform:translateX(8px)}}
.prow img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#1A1A2E;flex-shrink:0;}
.prow-info{flex:1;min-width:0;}
.prow-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prow-pos{font-size:9px;color:#444;margin-top:1px;}
.prow-ovr{font-family:'Bebas Neue',cursive;font-size:16px;flex-shrink:0;}
.msg-box{text-align:center;padding:50px 20px;color:#333;}
.msg-box .ico{font-size:40px;margin-bottom:10px;}
.msg-box .txt{font-size:11px;letter-spacing:2px;line-height:1.8;}

/* ── RIGHT ── */
#right{width:270px;min-width:270px;background:#0C0C12;border-left:1px solid #1A1A2E;display:flex;flex-direction:column;overflow:hidden;}
#team-header{padding:12px 14px 8px;border-bottom:1px solid #1A1A2E;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
#team-title{font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:3px;color:#E8C547;}
#team-ovr{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:#666;}

/* Formation tabs */
#form-tabs{display:flex;gap:3px;padding:7px 10px;border-bottom:1px solid #1A1A2E;flex-shrink:0;flex-wrap:wrap;}
.ftab{flex:0 0 auto;background:transparent;border:1px solid #252540;color:#555;font-size:8px;font-family:'Bebas Neue',cursive;letter-spacing:1px;padding:3px 7px;border-radius:3px;cursor:pointer;transition:all .15s;}
.ftab:hover{border-color:#4A9FD4;color:#4A9FD4;}
.ftab.active{border-color:#E8C547;color:#E8C547;background:rgba(232,197,71,.07);}
.ftab.locked{opacity:.4;cursor:default;pointer-events:none;}

/* Pitch */
#pitch-wrap{flex:1;padding:8px 10px 4px;display:flex;flex-direction:column;overflow:hidden;}
#pitch{position:relative;width:100%;flex:1;background:linear-gradient(180deg,#0a1a0a 0%,#0d1f0d 50%,#0a1a0a 100%);border-radius:8px;border:1px solid #1A2A1A;overflow:hidden;}
/* Pitch markings */
#pitch::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.04);transform:translateX(-50%);}
#pitch::after{content:'';position:absolute;left:50%;top:50%;width:60px;height:60px;border:1px solid rgba(255,255,255,.04);border-radius:50%;transform:translate(-50%,-50%);}

/* Slot */
.slot{position:absolute;transform:translate(-50%,-50%);width:44px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
.slot-circle{width:36px;height:36px;border-radius:50%;border:1.5px solid #2A3A2A;background:#0a150a;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.slot-pos{font-family:'Bebas Neue',cursive;font-size:9px;letter-spacing:1px;color:#3A5A3A;}
.slot-label{font-size:7px;color:#2A3A2A;letter-spacing:.5px;margin-top:2px;}

/* Slot states */
.slot.compatible .slot-circle{border-color:#E8C547;background:rgba(232,197,71,.1);animation:pulse-slot .8s ease-in-out infinite alternate;}
.slot.compatible .slot-pos{color:#E8C547;}
@keyframes pulse-slot{from{box-shadow:0 0 0 0 rgba(232,197,71,.3);}to{box-shadow:0 0 0 6px rgba(232,197,71,0);}}

.slot.filled .slot-circle{border:none;background:transparent;padding:0;overflow:hidden;width:36px;height:36px;}
.slot.filled img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.slot.filled .slot-ovr{position:absolute;bottom:-1px;right:-1px;font-family:'Bebas Neue',cursive;font-size:10px;background:#0D0D0D;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
.slot.filled .slot-label{font-size:7px;letter-spacing:.5px;margin-top:2px;}

/* Team stats */
#team-stats{padding:6px 12px 6px;flex-shrink:0;border-top:1px solid #1A1A2E;}
.tstat-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.tstat-label{font-size:8px;color:#444;letter-spacing:1px;width:28px;flex-shrink:0;}
.tstat-track{flex:1;height:2px;background:#1A1A2E;border-radius:2px;overflow:hidden;}
.tstat-fill{height:100%;width:0;border-radius:2px;transition:width .8s cubic-bezier(.22,1,.36,1);}
.tstat-val{font-size:9px;font-weight:600;width:20px;text-align:right;flex-shrink:0;}

#new-draft-btn{margin:8px 12px;background:transparent;border:1px solid #2A2A3E;color:#666;font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:2px;padding:7px;border-radius:5px;cursor:pointer;transition:all .2s;flex-shrink:0;}
#new-draft-btn:hover{border-color:#E85454;color:#E85454;}

/* Watermark */
#watermark{position:fixed;bottom:16px;right:280px;pointer-events:none;text-align:right;opacity:.035;z-index:0;}
#watermark div:first-child{font-family:'Bebas Neue',cursive;font-size:50px;color:#E8C547;letter-spacing:6px;line-height:1;}
#watermark div:last-child{font-size:9px;color:#fff;letter-spacing:3px;}

/* ── SEASON BUTTON ── */
#season-btn{display:none;margin:0 12px 10px;background:linear-gradient(135deg,#E8C547,#C8A030);color:#0D0D0D;font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:3px;padding:10px;border-radius:6px;cursor:pointer;border:none;transition:all .2s;flex-shrink:0;}
#season-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(232,197,71,.3);}
#season-btn.done{background:#1A2A1A;color:#2ECC8B;border:1px solid #2ECC8B;}

/* ── SEASON OVERLAY ── */
#season-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;backdrop-filter:blur(4px);}
#season-modal{position:absolute;inset:30px;background:#0F0F18;border:1px solid #1A1A2E;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
#season-header{padding:18px 24px 14px;border-bottom:1px solid #1A1A2E;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#season-header h2{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:4px;color:#E8C547;}
#season-meta{font-size:10px;color:#555;letter-spacing:2px;}
#close-season{background:none;border:1px solid #2A2A3E;color:#666;font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:2px;padding:5px 12px;border-radius:4px;cursor:pointer;}
#close-season:hover{border-color:#E85454;color:#E85454;}
#season-body{flex:1;overflow-y:auto;padding:16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
#season-body::-webkit-scrollbar{width:4px;}
#season-body::-webkit-scrollbar-thumb{background:#252540;}

/* Standings table */
.scard{background:#111118;border-radius:8px;border:1px solid #1A1A2E;overflow:hidden;}
.scard-title{font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:3px;color:#E8C547;padding:10px 14px;border-bottom:1px solid #1A1A2E;}
table.standings{width:100%;border-collapse:collapse;font-size:11px;}
table.standings th{font-size:8px;letter-spacing:1.5px;color:#444;text-transform:uppercase;padding:6px 8px;text-align:center;border-bottom:1px solid #1A1A2E;}
table.standings th:first-child{text-align:left;width:200px;}
table.standings td{padding:5px 8px;text-align:center;border-bottom:1px solid #0F0F18;transition:background .1s;}
table.standings td:first-child{text-align:left;}
table.standings tr:hover td{background:#151520;}
table.standings tr.my-team td{background:rgba(232,197,71,.06);}
table.standings tr.my-team td:first-child{border-left:2px solid #E8C547;}
.rank-num{font-family:'Bebas Neue',cursive;font-size:14px;color:#444;width:20px;display:inline-block;text-align:right;margin-right:6px;}
.rank-num.champions{color:#E8C547;}
.rank-num.europe{color:#4A9FD4;}
.rank-num.relegate{color:#E85454;}
.team-name-cell{display:flex;align-items:center;gap:2px;}
.pts-cell{font-family:'Bebas Neue',cursive;font-size:16px;color:#E0E0E0;}
.form-pip{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 1px;}

/* Results summary */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;padding:10px 14px;}
.result-row{background:#0D0D14;border-radius:5px;padding:6px 8px;font-size:10px;border:1px solid #1A1A2E;}
.result-row.win{border-left:2px solid #2ECC8B;}
.result-row.draw{border-left:2px solid #E8C547;}
.result-row.loss{border-left:2px solid #E85454;}
.result-score{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;}
.result-opp{font-size:9px;color:#555;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-ha{font-size:8px;color:#333;letter-spacing:1px;}

/* Season stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px;}
.sstat{background:#0D0D14;border-radius:5px;padding:8px 10px;text-align:center;}
.sstat-val{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;}
.sstat-label{font-size:8px;color:#444;letter-spacing:1px;margin-top:2px;}

/* ── MOBILE TAB BAR ─────────────────────────────────────────────────── */
#mob-tabs{display:none;}

@media(max-width:700px){
  body{flex-direction:column;height:100dvh;overflow:hidden;}

  /* Tab bar fixe en bas */
  #mob-tabs{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:#0D0D12;border-top:1px solid #1A1A2E;height:56px;
  }
  .mtab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;background:none;border:none;color:#444;cursor:pointer;
    font-family:'Bebas Neue',cursive;font-size:9px;letter-spacing:1.5px;
    transition:color .15s;padding:6px 0;
  }
  .mtab .ico{font-size:20px;line-height:1;}
  .mtab.active{color:#E8C547;}
  .mtab.active .ico{filter:drop-shadow(0 0 4px rgba(232,197,71,.5));}

  /* Les 3 panneaux s'empilent et se cachent */
  #left, #center, #right{
    position:fixed;inset:0;bottom:56px;
    width:100% !important;min-width:0 !important;
    height:calc(100dvh - 56px);
    display:none !important;
    flex-direction:column;overflow:hidden;
    border:none !important;
  }
  #left.mob-active, #center.mob-active, #right.mob-active{
    display:flex !important;
  }

  /* Left — agrandir le dé et le badge */
  #left{padding:20px 16px 14px;justify-content:flex-start;gap:0;}
  .dr-label{font-size:12px;margin-bottom:10px;}
  #dice{font-size:72px;}
  #roll-cta{font-size:15px;letter-spacing:4px;margin-top:12px;}
  #club-badge{margin-top:16px;padding:12px 10px;}
  #cshort{font-size:48px;}
  #cname{font-size:12px;}
  #cseason{font-size:11px;}
  #ovr-num{font-size:40px;}
  .stat-label{font-size:11px;}
  .stat-val{font-size:12px;}
  .stat-track{height:4px;}
  #stats-panel{margin-top:14px;}
  .stat-row{margin-bottom:8px;}
  #pool-info{font-size:10px;margin-top:12px;}

  /* Center — joueurs pleine largeur */
  #toolbar{padding:8px 12px;gap:6px;flex-wrap:wrap;}
  .fb{font-size:10px;padding:4px 10px;}
  #ovr-label{font-size:10px;}
  #ovr-range{width:80px;}
  #ovr-val{font-size:12px;}
  #plist{padding:8px 12px;}
  .prow{padding:8px 10px;gap:10px;}
  .prow img{width:36px;height:36px;}
  .prow-name{font-size:13px;}
  .prow-pos{font-size:11px;}
  .prow-ovr{font-size:20px;}
  #pick-hint{font-size:12px;padding:10px;}
  .cat-head{font-size:11px;}

  /* Right — formation pleine hauteur */
  #right{border:none;}
  #team-header{padding:14px 16px 10px;}
  #team-title{font-size:16px;}
  #team-ovr{font-size:24px;}
  #form-tabs{padding:8px 12px;gap:4px;}
  .ftab{font-size:10px;padding:4px 10px;}
  #pitch-wrap{padding:10px 12px 6px;flex:1;}
  .slot{width:52px;height:52px;}
  .slot-circle{width:44px;height:44px;}
  .slot-label{font-size:8px;}
  .slot.filled img{width:44px;height:44px;}
  .slot.filled .slot-ovr{font-size:11px;width:18px;height:18px;}
  .tstat-label{font-size:10px;width:32px;}
  .tstat-val{font-size:11px;}
  #season-btn{margin:6px 14px 4px;font-size:14px;padding:12px;}
  #new-draft-btn{margin:4px 14px 8px;font-size:12px;}

  /* Season modal plein écran */
  #season-modal{inset:0;border-radius:0;}
  #season-body{grid-template-columns:1fr;padding:12px 16px;}
  #season-header{padding:14px 16px 12px;}
  #season-header h2{font-size:14px;}
  table.standings{font-size:12px;}
  table.standings th:first-child{width:140px;}
  .rank-num{font-size:16px;}
  .results-grid{grid-template-columns:1fr 1fr;gap:5px;padding:8px 12px;}
  .result-score{font-size:18px;}
  .stat-grid{grid-template-columns:1fr 1fr;gap:6px;padding:8px 12px;}
  .sstat-val{font-size:20px;}
}
</style>
</head>
<body>

<!-- LEFT -->
<div id="left">
  <div class="dr-label">
    <span>DRAFT ROOM</span>
    <span id="roll-counter">0/11</span>
  </div>
  <div id="dice-wrap">
    <div id="dice">🎲</div>
  </div>
  <div id="roll-cta">LANCER LE DÉ</div>
  <div id="club-badge">
    <div id="cshort" style="color:#2A2A3A;">—</div>
    <div id="cname" style="color:#333;">Aucun club</div>
    <div id="cseason"></div>
  </div>
  <div id="stats-panel">
    <div id="ovr-block">
      <div id="ovr-num" style="color:#222;">—</div>
      <div id="ovr-sub">OVR MOY. CLUB</div>
    </div>
    <div class="stat-row">
      <div class="stat-top"><span class="stat-label">⚽ ATT</span><span class="stat-val" id="sv-att"></span></div>
      <div class="stat-track"><div class="stat-fill" id="sf-att" style="background:#E85454;"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-top"><span class="stat-label">🎯 MIL</span><span class="stat-val" id="sv-mid"></span></div>
      <div class="stat-track"><div class="stat-fill" id="sf-mid" style="background:#2ECC8B;"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-top"><span class="stat-label">🛡 DEF</span><span class="stat-val" id="sv-def"></span></div>
      <div class="stat-track"><div class="stat-fill" id="sf-def" style="background:#4A9FD4;"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-top"><span class="stat-label">🧤 GK</span><span class="stat-val" id="sv-gk"></span></div>
      <div class="stat-track"><div class="stat-fill" id="sf-gk" style="background:#E8C547;"></div></div>
    </div>
  </div>
  <div id="pool-info"></div>
</div>

<!-- CENTER -->
<div id="center">
  <div id="toolbar">
    <button class="fb active" data-f="ALL">TOUS</button>
    <button class="fb" data-f="GK">GK</button>
    <button class="fb" data-f="DEF">DEF</button>
    <button class="fb" data-f="MID">MID</button>
    <button class="fb" data-f="ATT">ATT</button>
    <button class="fb" data-f="?">?</button>
    <span id="ovr-label">OVR≥</span>
    <input type="range" id="ovr-range" min="50" max="95" value="50" style="accent-color:#E8C547;width:65px;">
    <span id="ovr-val" style="font-size:10px;color:#E8C547;font-family:'Bebas Neue',cursive;">50</span>
    <span id="result-count"></span>
  </div>
  <div id="pick-hint">👆 CLIQUE SUR UN JOUEUR POUR LE DRAFTER</div>
  <div id="plist">
    <div class="msg-box">
      <div class="ico">🎲</div>
      <div class="txt">LANCE LE DÉ<br>POUR RÉVÉLER UN CLUB</div>
    </div>
  </div>
</div>

<!-- RIGHT — FORMATION -->
<div id="right">
  <div id="team-header">
    <span id="team-title">MON ÉQUIPE</span>
    <span id="team-ovr">—</span>
  </div>

// ── State ─────────────────────────────────────────────────────────────────────
let S = {
  pool: [],           // remaining club objects
  currentClub: null,
  formation: '4-3-3',
  slots: [],          // {id, pos, x, y, player: null|{...}}
  rollsUsed: 0,

  formationLocked: false,
};

// ── Init slots ────────────────────────────────────────────────────────────────
function initSlots() {
  S.slots = FORMATIONS[S.formation].map(s => ({...s, player: null}));
}

function resetPool() {
  S.pool = [...ALL_CLUBS];
}

// ── Compatibility ─────────────────────────────────────────────────────────────
function playerCompatible(player, slot) {
  const compat = SLOT_COMPAT[slot.pos] || [slot.pos];
  return player.alt.some(p => compat.includes(p));
}

function playerHasEmptySlot(player) {
  return S.slots.some(s => !s.player && playerCompatible(player, s));
}

function compatibleEmptySlots(player) {
  return S.slots.filter(s => !s.player && playerCompatible(player, s));
}

// ── Roll ──────────────────────────────────────────────────────────────────────
function roll() {
  if (S.phase !== 'idle' || S.rollsUsed >= 11 || S.pool.length === 0) return;

  // Pick random club
  const idx  = Math.floor(Math.random() * S.pool.length);
  const club = S.pool[idx];

  // Check if at least one player is draftable
  const hasDraftable = club.p.some(p => playerHasEmptySlot(p));
  if (!hasDraftable) {
    // Free reroll: this club has no usable players for remaining slots
    S.pool.splice(idx, 1);
    if (S.pool.length === 0) { endDraft(); return; }
    // try again
    roll(); return;
  }

  S.pool.splice(idx, 1);
  S.currentClub = club;
  S.phase = 'pick';
  mobSwitch('center');

  const d = $('dice');
  d.classList.remove('shake');
  void d.offsetWidth;
  d.classList.add('shake');
  d.classList.add('disabled');
  setTimeout(() => revealClub(club), 420);
}

function revealClub(club) {
  $('cshort').textContent = club.s;
  $('cshort').style.color = club.c;
  $('cname').textContent  = club.n;
  $('cname').style.color  = '#999';

  const season = SEASONS.find(s => s.id === club.sid);
  $('cseason').textContent = (season ? season.fifa : '') + ' · ' + (club.slabel || '');
  $('cseason').style.color = club.c;

  // Stats
  const cats = {ATT:[],MID:[],DEF:[],GK:[]};
  club.p.forEach(p => { if(cats[p.cat]) cats[p.cat].push(p.o); });
  const ovrAvg = avg(club.p.map(p=>p.o));
  $('ovr-num').textContent = ovrAvg || '—';
  $('ovr-num').style.color = club.c;
  [['ATT','sv-att','sf-att'],['MID','sv-mid','sf-mid'],['DEF','sv-def','sf-def'],['GK','sv-gk','sf-gk']].forEach(([cat,vi,fi]) => {
    const v = avg(cats[cat]);
    $(vi).textContent = v || '—';
    setTimeout(() => { $(fi).style.width = v + '%'; }, 80);
  });

  $('pool-info').textContent = S.pool.length + ' CLUB' + (S.pool.length!==1?'S':'') + ' RESTANT' + (S.pool.length!==1?'S':'');
  $('pick-hint').style.display = 'block';
  renderPlayers();
}

// ── Pick player ───────────────────────────────────────────────────────────────
function selectPlayer(player, rowEl) {
  if (S.phase !== 'pick' && S.phase !== 'selecting_slot') return;
  if (!playerHasEmptySlot(player)) return;

  // Deselect if same
  if (S.selectedPlayer === player) {
    S.selectedPlayer = null;
    S.phase = 'pick';
    renderPlayers();
    renderFormation();
    return;
  }

  S.selectedPlayer = player;
  S.phase = 'selecting_slot';
  renderPlayers();
  renderFormation();
}

function assignToSlot(slotId) {
  if (S.phase !== 'selecting_slot' || !S.selectedPlayer) return;
  const slot = S.slots.find(s => s.id === slotId);
  if (!slot || slot.player || !playerCompatible(S.selectedPlayer, slot)) return;

  // Animate out the selected player row (find it in DOM)
  const rows = document.querySelectorAll('.prow.selected');
  rows.forEach(r => {
    r.classList.add('fly');
  });

  setTimeout(() => {
    slot.player = S.selectedPlayer;
    S.rollsUsed++;
    S.selectedPlayer = null;
    S.formationLocked = true;
    S.phase = S.rollsUsed >= 11 ? 'done' : 'idle';

    $('roll-counter').textContent = S.rollsUsed + '/11';
    $('roll-cta').textContent = S.phase === 'done' ? 'DRAFT TERMINÉE' : 'LANCER LE DÉ';
    $('pick-hint').style.display = 'none';
    $('dice').classList.remove('disabled');

    if (S.phase !== 'done') {
      showIdleCenter();
    } else {
      endDraft();
    }
    renderFormation();
    updateTeamStats();
    mobSwitch('right');

    // Lock formation tabs
    document.querySelectorAll('.ftab').forEach(b => b.classList.add('locked'));
  }, 320);
}

// ── Render players (center) ───────────────────────────────────────────────────
function renderPlayers() {
  const club = S.currentClub;
  if (!club) return;
  const list = $('plist');
  list.innerHTML = '';

  const CAT_ORDER  = ['GK','DEF','MID','ATT','?'];
  const CAT_LABELS = {GK:'GARDIENS',DEF:'DÉFENSEURS',MID:'MILIEUX',ATT:'ATTAQUANTS','?':'DIVERS'};

  let total = 0;
  CAT_ORDER.forEach(cat => {
    const players = club.p.filter(p =>
      (S.posFilter==='ALL' || p.cat===S.posFilter) &&
      p.o >= S.ovrFilter &&
      (cat==='?' ? !['GK','DEF','MID','ATT'].includes(p.cat) : p.cat===cat)
    );
    if (!players.length) return;

    const head = document.createElement('div');
    head.className = 'cat-head';
    head.style.color = CAT_COLORS[cat] || '#555';
    head.textContent = CAT_LABELS[cat] || cat;
    list.appendChild(head);

    players.forEach((p, i) => {
      const blocked  = !playerHasEmptySlot(p);
      const selected = S.selectedPlayer === p;
      const row = document.createElement('div');
      row.className = 'prow' + (blocked?' blocked':'') + (selected?' selected':'');
      setTimeout(() => { if (!row.classList.contains('fly')) row.classList.add('pin'); }, i*22);

      row.innerHTML = `
        <img src="${p.ph}" alt="${p.n}"
          onerror="this.style.background='#1A1A2E';this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
        <div class="prow-info">
          <div class="prow-name">${p.n}</div>
          <div class="prow-pos" style="color:${blocked?'#2A2A2A':CAT_COLORS[p.cat]||'#444'}">${p.pos} · ${p.label}</div>
        </div>
        <div class="prow-ovr" style="color:${blocked?'#2A2A2A':S.currentClub.c}">${p.o}</div>
      `;
      if (!blocked) {
        row.addEventListener('click', () => selectPlayer(p, row));
      }
      list.appendChild(row);
      total++;
    });
  });

  $('result-count').textContent = total + ' JOUEUR' + (total!==1?'S':'');
  if (!total) {
    list.innerHTML = '<div class="msg-box"><div class="ico">🔍</div><div class="txt">AUCUN JOUEUR NE CORRESPOND</div></div>';
  }
}

// ── Render formation (right) ──────────────────────────────────────────────────
function renderFormation() {
  const pitch = $('pitch');
  pitch.innerHTML = '';

  const compat = S.selectedPlayer ? compatibleEmptySlots(S.selectedPlayer) : [];
  const compatIds = new Set(compat.map(s=>s.id));

  S.slots.forEach(slot => {
    const el = document.createElement('div');
    el.className = 'slot' + (slot.player?' filled':'') + (compatIds.has(slot.id)?' compatible':'');
    el.style.left = slot.x + '%';
    el.style.top  = slot.y + '%';

    if (slot.player) {
      const p = slot.player;
      const posColor = CAT_COLORS[p.cat] || '#666';
      el.innerHTML = `
        <div class="slot-circle" style="border:2px solid ${p.clubColor||'#E8C547'}30;position:relative;">
          <img src="${p.ph}" alt="${p.n}"
            onerror="this.style.background='#1A1A2E';this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='"
            style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
          <div class="slot-ovr" style="color:${p.clubColor||'#E8C547'}">${p.o}</div>
        </div>
        <div class="slot-label" style="color:${posColor};max-width:48px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.n.split(' ').pop()}</div>
      `;
    } else {
      const posColor = compatIds.has(slot.id) ? '#E8C547' : '#2A4A2A';
      el.innerHTML = `
        <div class="slot-circle">
          <span class="slot-pos" style="color:${posColor}">${slot.pos}</span>
        </div>
        <div class="slot-label" style="color:${posColor}80">${slot.pos}</div>
      `;
    }

    if (compatIds.has(slot.id)) {
      el.addEventListener('click', () => assignToSlot(slot.id));
    }
    pitch.appendChild(el);
  });
}

// ── Team stats ────────────────────────────────────────────────────────────────
function updateTeamStats() {
  const filledPlayers = S.slots.filter(s=>s.player).map(s=>s.player);
  if (!filledPlayers.length) {
    $('team-ovr').textContent = '—';
    $('team-ovr').style.color = '#333';
    [['att','ATT'],['mid','MID'],['def','DEF'],['gk','GK']].forEach(([k,cat]) => {
      $('tv-'+k).textContent = '—';
      $('tf-'+k).style.width = '0';
    });
    return;
  }

  const cats = {ATT:[],MID:[],DEF:[],GK:[]};
  filledPlayers.forEach(p => { if(cats[p.cat]) cats[p.cat].push(p.o); });

  const ovrAvg = avg(filledPlayers.map(p=>p.o));
  $('team-ovr').textContent = ovrAvg;
  $('team-ovr').style.color = '#E8C547';

  [['att','ATT'],['mid','MID'],['def','DEF'],['gk','GK']].forEach(([k,cat]) => {
    const v = avg(cats[cat]);
    $('tv-'+k).textContent = v || '—';
    setTimeout(() => { $('tf-'+k).style.width = v + '%'; }, 80);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// SIMULATION DE SAISON
// ══════════════════════════════════════════════════════════════════════════════

// Poisson distribution (Knuth algorithm)
function poisson(lambda) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return Math.min(k - 1, 9); // cap at 9
}

// Compute my team's ratings from drafted slots
function myTeamRatings() {
  const players = S.slots.filter(s => s.player).map(s => s.player);
  const byCAT = cat => players.filter(p => p.cat === cat).map(p => p.o);
  const mean  = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 72;
  const gk  = mean(byCAT('GK'));
  const def = mean(byCAT('DEF'));
  const mid = mean(byCAT('MID'));
  const fwd = mean(byCAT('ATT'));
  return {
    n: 'MON ÉQUIPE', s: 'MOI', c: '#E8C547', isMe: true,
    gk: Math.round(gk), def: Math.round(def),
    mid: Math.round(mid), fwd: Math.round(fwd),
    atk:  Math.round(0.55*fwd + 0.35*mid + 0.10*def),
    defr: Math.round(0.35*gk  + 0.45*def + 0.20*mid),
    ovr:  Math.round((gk + 1.2*def + 1.2*mid + fwd) / 4.4),
  };
}

// Simulate one match — returns {goalsH, goalsA}
function simMatch(home, away) {
  // Expected goals using the 38-0 formula
  const lambdaH = Math.max(0.2, 1.3 + (home.atk - away.defr) / 10);
  const lambdaA = Math.max(0.2, 1.3 + (away.atk - home.defr) / 10);
  // Random factor ×0.30 (more upsets than original ×0.18)
  const pH = 1 + (Math.random() - 0.5) * 0.30;
  const pA = 1 + (Math.random() - 0.5) * 0.30;
  return {
    goalsH: poisson(Math.max(0.15, lambdaH * pH)),
    goalsA: poisson(Math.max(0.15, lambdaA * pA)),
  };
}

// Simulate full 34-game season (home + away vs every opponent)
function simulateSeason() {
  const me  = myTeamRatings();
  // Build full squad: my team + all 17 other L1 teams (replace if same name)
  const others = LIGUE1_TEAMS.filter(t => t.n !== 'MON ÉQUIPE');
  const teams  = [me, ...others];

  // Standings init
  const table = {};
  teams.forEach(t => {
    table[t.n] = { t, pts:0, w:0, d:0, l:0, gf:0, ga:0, played:0, form:[] };
  });

  const myResults = []; // {opp, goalsMe, goalsOpp, home}

  // Every team plays every other team twice (home + away)
  for (let i = 0; i < teams.length; i++) {
    for (let j = i + 1; j < teams.length; j++) {
      const home = teams[i], away = teams[j];

      // Match 1: i at home
      const m1 = simMatch(home, away);
      applyResult(table, home.n, away.n, m1.goalsH, m1.goalsA);
      if (home.isMe || away.isMe) {
        myResults.push({
          opp: home.isMe ? away : home,
          goalsMe:  home.isMe ? m1.goalsH : m1.goalsA,
          goalsOpp: home.isMe ? m1.goalsA : m1.goalsH,
          home: home.isMe,
        });
      }

      // Match 2: j at home
      const m2 = simMatch(away, home);
      applyResult(table, away.n, home.n, m2.goalsH, m2.goalsA);
      if (home.isMe || away.isMe) {
        myResults.push({
          opp: home.isMe ? away : home,
          goalsMe:  home.isMe ? m2.goalsA : m2.goalsH,
          goalsOpp: home.isMe ? m2.goalsH : m2.goalsA,
          home: away.isMe,
        });
      }
    }
  }

  // Sort standings
  const sorted = Object.values(table).sort((a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const gdA = a.gf - a.ga, gdB = b.gf - b.ga;
    if (gdB !== gdA) return gdB - gdA;
    return b.gf - a.gf;
  });

  return { sorted, myResults, me };
}

function applyResult(table, hn, an, gh, ga) {
  const h = table[hn], a = table[an];
  h.gf += gh; h.ga += ga; h.played++;
  a.gf += ga; a.ga += gh; a.played++;
  if (gh > ga) {
    h.pts += 3; h.w++; h.form.push('W');
    a.l++;       a.form.push('L');
  } else if (gh === ga) {
    h.pts += 1; h.d++; h.form.push('D');
    a.pts += 1; a.d++; a.form.push('D');
  } else {
    h.l++;       h.form.push('L');
    a.pts += 3; a.w++; a.form.push('W');
  }
}

function renderSeason(data) {
  const {sorted, myResults, me} = data;
  const myRank = sorted.findIndex(r => r.t.isMe) + 1;

  // Meta
  const myRow  = sorted.find(r => r.t.isMe);
  const wins   = myResults.filter(r => r.goalsMe > r.goalsOpp).length;
  const draws  = myResults.filter(r => r.goalsMe === r.goalsOpp).length;
  const losses = myResults.filter(r => r.goalsMe < r.goalsOpp).length;
  const gf     = myResults.reduce((s,r) => s + r.goalsMe, 0);
  const ga     = myResults.reduce((s,r) => s + r.goalsOpp, 0);

  const rankEmoji = myRank === 1 ? '🏆' : myRank <= 3 ? '🥈' : myRank <= 5 ? '🇪🇺' : myRank >= 16 ? '📉' : '⚽';
  $('season-meta').textContent = `${rankEmoji}  ${myRank}E · ${myRow.pts} PTS · OVR ${me.ovr}`;

  const body = $('season-body');
  body.innerHTML = '';

  // ── Standings ──────────────────────────────────────────────────────────────
  const standDiv = document.createElement('div');
  standDiv.className = 'scard';
  standDiv.innerHTML = `<div class="scard-title">🏆 CLASSEMENT FINAL</div>`;

  const tbl = document.createElement('table');
  tbl.className = 'standings';
  tbl.innerHTML = `<thead><tr>
    <th style="text-align:left">ÉQUIPE</th>
    <th>MJ</th><th>V</th><th>N</th><th>D</th>
    <th>BP</th><th>BC</th><th>DIFF</th><th>PTS</th>
  </tr></thead>`;

  const tbody = document.createElement('tbody');
  sorted.forEach((row, idx) => {
    const rank = idx + 1;
    const rankClass = rank <= 3 ? 'champions' : rank <= 5 ? 'europe' : rank >= 16 ? 'relegate' : '';
    const gd = row.gf - row.ga;
    const gdStr = gd > 0 ? '+'+gd : gd;
    const isMe = row.t.isMe;
    const tr = document.createElement('tr');
    if (isMe) tr.className = 'my-team';

    // Last 5 form pills
    const last5 = row.form.slice(-5);
    const formHTML = last5.map(r => {
      const col = r==='W'?'#2ECC8B':r==='D'?'#E8C547':'#E85454';
      return `<span class="form-pip" style="background:${col}" title="${r}"></span>`;
    }).join('');

    tr.innerHTML = `
      <td><div class="team-name-cell">
        <span class="rank-num ${rankClass}">${rank}</span>
        <span style="color:${row.t.c};font-weight:${isMe?'600':'400'}">${isMe ? '⭐ '+row.t.s : row.t.s}</span>
        <span style="margin-left:4px">${formHTML}</span>
      </div></td>
      <td>${row.played}</td>
      <td style="color:#2ECC8B">${row.w}</td>
      <td style="color:#E8C547">${row.d}</td>
      <td style="color:#E85454">${row.l}</td>
      <td>${row.gf}</td>
      <td>${row.ga}</td>
      <td style="color:${gd>=0?'#2ECC8B':'#E85454'}">${gdStr}</td>
      <td class="pts-cell">${row.pts}</td>
    `;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  standDiv.appendChild(tbl);
  body.appendChild(standDiv);

  // ── Right column: stats + results ─────────────────────────────────────────
  const rightCol = document.createElement('div');
  rightCol.style.display = 'flex';
  rightCol.style.flexDirection = 'column';
  rightCol.style.gap = '16px';

  // My season stats
  const statsCard = document.createElement('div');
  statsCard.className = 'scard';
  const rankColor = myRank<=3?'#E8C547':myRank<=5?'#4A9FD4':myRank>=16?'#E85454':'#2ECC8B';
  statsCard.innerHTML = `
    <div class="scard-title">⭐ MON ÉQUIPE · BILAN</div>
    <div class="stat-grid">
      <div class="sstat"><div class="sstat-val" style="color:${rankColor}">${myRank}E</div><div class="sstat-label">CLASSEMENT</div></div>
      <div class="sstat"><div class="sstat-val" style="color:#E8C547">${myRow.pts}</div><div class="sstat-label">POINTS</div></div>
      <div class="sstat"><div class="sstat-val" style="color:#2ECC8B">${wins}</div><div class="sstat-label">VICTOIRES</div></div>
      <div class="sstat"><div class="sstat-val" style="color:#E8C547">${draws}</div><div class="sstat-label">NULS</div></div>
      <div class="sstat"><div class="sstat-val" style="color:#E85454">${losses}</div><div class="sstat-label">DÉFAITES</div></div>
      <div class="sstat"><div class="sstat-val" style="color:#4A9FD4">${gf}/${ga}</div><div class="sstat-label">BP / BC</div></div>
    </div>
  `;
  rightCol.appendChild(statsCard);

  // My results (sorted: W then D then L)
  const resCard = document.createElement('div');
  resCard.className = 'scard';
  resCard.innerHTML = '<div class="scard-title">📋 MES RÉSULTATS</div>';
  const resGrid = document.createElement('div');
  resGrid.className = 'results-grid';

  // Sort: wins first, then draws, then losses
  const sortedRes = [...myResults].sort((a,b) => {
    const score = r => r.goalsMe > r.goalsOpp ? 0 : r.goalsMe === r.goalsOpp ? 1 : 2;
    return score(a) - score(b);
  });

  sortedRes.forEach(r => {
    const isW = r.goalsMe > r.goalsOpp, isD = r.goalsMe === r.goalsOpp;
    const cls = isW ? 'win' : isD ? 'draw' : 'loss';
    const div = document.createElement('div');
    div.className = `result-row ${cls}`;
    div.innerHTML = `
      <div class="result-ha" style="color:${r.home?'#E8C547':'#4A9FD4'}">${r.home?'DOMICILE':'EXTÉRIEUR'}</div>
      <div class="result-score" style="color:${isW?'#2ECC8B':isD?'#E8C547':'#E85454'}">${r.goalsMe} - ${r.goalsOpp}</div>
      <div class="result-opp" style="color:${r.opp.c}">${r.opp.s}</div>
    `;
    resGrid.appendChild(div);
  });
  resCard.appendChild(resGrid);
  rightCol.appendChild(resCard);

  body.appendChild(rightCol);
  $('season-overlay').style.display = 'block';
  $('season-btn').className = 'done';
  $('season-btn').textContent = '🏆 VOIR LE CLASSEMENT';
}

function runSeason() {
  const filled = S.slots.filter(s=>s.player).length;
  if (filled < 11) {
    alert("Complète d’abord ton équipe — 11 joueurs requis !");
    return;
  }
  const data = simulateSeason();
  renderSeason(data);
}

$('season-btn').addEventListener('click', () => {
  if ($('season-btn').classList.contains('done')) {
    $('season-overlay').style.display = 'block';
  } else {
    runSeason();
  }
});
$('close-season').addEventListener('click', () => { $('season-overlay').style.display = 'none'; });
$('season-overlay').addEventListener('click', e => { if(e.target===$('season-overlay')) $('season-overlay').style.display='none'; });

resetPool();
initSlots();
renderFormation();
